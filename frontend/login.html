<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Revise-AI</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h2><i class="fas fa-brain"></i> Revise-AI</h2>
        <div id="error-box" class="error-message"></div>
        <form id="login-form">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="register.html">Sign Up</a>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem('revise_ai_token')) {
            window.location.href = 'index.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');

            try {
                const result = await login(email, password);
                if (result.token) {
                    localStorage.setItem('revise_ai_token', result.token);
                    localStorage.setItem('revise_ai_user', JSON.stringify(result.user));
                    window.location.href = 'index.html';
                } else {
                    errorBox.innerText = result.error || "Login failed";
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.innerText = "Connection error";
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
